version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nexus_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: nexus_db
    ports:
      - "5434:5432"
    volumes:
      - nexus_pg_data:/var/lib/postgresql/data
    networks:
      - nexus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: nexus_redis
    networks:
      - nexus_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: nexus_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    ports:
      - "8005:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:securepassword@db:5432/nexus_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=bcore_nexus_super_secret_local_key_development_only
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - ALLOWED_ORIGINS=*
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus_network

  frontend:
    build:
      context: ./frontend
    container_name: nexus_frontend
    depends_on:
      - backend
    ports:
      - "3005:80"
    networks:
      - nexus_network

networks:
  nexus_network:
    driver: bridge

volumes:
  nexus_pg_data:
